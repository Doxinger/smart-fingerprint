<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SmartFingerprint ESM Example</title>
</head>
<body>
  <h1>SmartFingerprint ESM Example</h1>

  <script type="module">
    import SmartFingerprint from "https://cdn.jsdelivr.net/npm/@doxinger/smart-fingerprint/src/main.js";

    window.SmartFingerprint = SmartFingerprint;

    const stop = SmartFingerprint.on("fingerprint:ready", (event) => {
      console.log("fingerprint ready", event.detail);
    });

    const current = await SmartFingerprint.get({
      includeCanvas: true,
      includeWebGL: true,
      includeAudio: false
    });

    console.log("current", current);

    const prev = JSON.parse(localStorage.getItem("demo_prev_fp") || "null");

    if (prev) {
      console.log("compare", SmartFingerprint.compare(prev, current));
    }

    localStorage.setItem("demo_prev_fp", JSON.stringify(current));

    stop();
  </script>
</body>
</html>
